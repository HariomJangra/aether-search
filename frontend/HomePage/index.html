<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/?size=100&id=10029&format=png&color=000000">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Main Search Input -->
        <div class="search-container">
            <div class="search-box">
                <!-- Input Field -->
                <textarea 
                    class="search-input" 
                    placeholder="Ask anything..."
                    rows="1"
                ></textarea>

                <!-- Search Engine Dropdown Button -->
                <div class="search-engine-dropdown">
                    <button class="search-engine-btn" id="searchEngineBtn">
                        <svg class="engine-icon-btn" id="engineIconBtn" viewBox="0 0 24 24" fill="currentColor">
                            <image href="https://img.icons8.com/?size=100&id=17949&amp;format=png&amp;color=000000" x="0" y="0" width="24" height="24" preserveAspectRatio="xMidYMid meet" />
                        </svg>
                        <span class="engine-name">Google</span>
                        <svg class="dropdown-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </button>
                    <div class="dropdown-menu" id="dropdownMenu">
                        <div class="dropdown-item" data-engine="google">
                            <img class="engine-icon" src="https://img.icons8.com/?size=100&id=17949&amp;format=png&amp;color=000000" alt="Google">
                            <span>Google</span>
                        </div>
                        <div class="dropdown-item" data-engine="bing">
                            <img class="engine-icon" src="https://img.icons8.com/?size=100&id=pOADWgX6vV63&amp;format=png&amp;color=000000" alt="Bing">
                            <span>Bing</span>
                        </div>
                        <div class="dropdown-item" data-engine="duckduckgo">
                            <img class="engine-icon" src="https://img.icons8.com/?size=100&id=63778&amp;format=png&amp;color=000000" alt="DuckDuckGo">
                            <span>DuckDuckGo</span>
                        </div>
                        <div class="dropdown-item" data-engine="yahoo">
                            <img class="engine-icon" src="https://img.icons8.com/?size=100&id=G3F1h1aX2vpT&amp;format=png&amp;color=000000" alt="Yahoo">
                            <span>Yahoo</span>
                        </div>
                        <div class="dropdown-item" data-engine="brave">
                            <img class="engine-icon" src="https://img.icons8.com/?size=100&id=ZAPJV5FAO4PW&amp;format=png&amp;color=000000" alt="Brave">
                            <span>Brave</span>
                        </div>
                    </div>
                </div>

                <!-- Submit Button -->
                <button class="submit-btn" title="Submit">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </div>
            <!-- Suggestions Dropdown -->
            <div class="suggestions-dropdown" id="suggestionsDropdown"></div>
        </div>

        <!-- Service Buttons -->
        <div class="services-container" id="servicesContainer">
            <!-- Service buttons will be dynamically generated -->
        </div>

        <!-- Edit Modal -->
        <div class="edit-modal" id="editModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Edit Service</h3>
                    <button class="close-btn" id="closeModal">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="serviceUrl">URL</label>
                        <input type="url" id="serviceUrl" placeholder="https://example.com" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="serviceName">Name</label>
                        <input type="text" id="serviceName" placeholder="Custom Name" autocomplete="off">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-cancel" id="cancelBtn">Cancel</button>
                    <button class="btn-save" id="saveBtn">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
